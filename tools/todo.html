<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart URL Editor – Research Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="quill.snow.css" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg: #0f0d1a;
            --bg-card: #252033;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --accent-green: #34d399;
            --accent-teal: #2dd4bf;
            --border: rgba(167, 139, 250, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(15, 13, 26, 0.6);
            --toolbar-bg: rgba(167, 139, 250, 0.12);
            --toolbar-active: rgba(167, 139, 250, 0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            /* Light Theme */
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --accent-purple: #7c3aed;
            --accent-blue: #2563eb;
            --accent-green: #059669;
            --accent-teal: #0d9488;
            --border: rgba(124, 58, 237, 0.2);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --input-bg: #f1f5f9;
            --toolbar-bg: #f1f5f9;
            --toolbar-active: #e2e8f0;
        }

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 2rem;
            background: var(--bg-card);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav-left { display: flex; align-items: center; gap: 2rem; }

        .back-link {
            color: var(--accent-teal);
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: var(--transition);
            opacity: 0.8;
        }
        .back-link:hover { opacity: 1; transform: translateX(-4px); }

        .thin-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-teal);
            letter-spacing: 0.01em;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: var(--transition);
        }
        .theme-toggle:hover { 
            transform: scale(1.1) rotate(12deg);
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px var(--border);
        }

        /* Main Content */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .editor-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-height: 60vh;
        }

        /* Quill Theme Overrides */
        .ql-toolbar.ql-snow {
            border-color: var(--border) !important;
            background: var(--toolbar-bg);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            border-bottom: none !important;
            position: sticky;
            top: 73px; /* nav height offset */
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .ql-container.ql-snow {
            border-color: var(--border) !important;
            background: var(--input-bg);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            flex: 1;
            font-family: 'Open Sans', sans-serif;
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .ql-editor {
            min-height: 500px;
            color: var(--text);
            line-height: 1.8;
            padding: 2.5rem;
        }
        
        .ql-snow .ql-stroke { stroke: var(--text-muted) !important; transition: stroke 0.2s; }
        .ql-snow .ql-fill { fill: var(--text-muted) !important; transition: fill 0.2s; }
        .ql-snow .ql-picker { color: var(--text-muted) !important; transition: color 0.2s; }
        .ql-snow.ql-toolbar button:hover .ql-stroke, 
        .ql-snow.ql-toolbar button.ql-active .ql-stroke,
        .ql-snow.ql-toolbar .ql-picker-label:hover .ql-stroke { stroke: var(--accent-teal) !important; }
        .ql-snow.ql-toolbar button:hover .ql-fill, 
        .ql-snow.ql-toolbar button.ql-active .ql-fill { fill: var(--accent-teal) !important; }
        .ql-editor.ql-blank::before { color: var(--text-muted) !important; opacity: 0.4; }

        /* Bottom Settings */
        .settings-section {
            margin-top: 4rem;
            padding-bottom: 5rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .card:hover { border-color: var(--accent-purple); }

        .input-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.15);
        }

        .button-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }

        button.btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--accent-teal); color: #fff; }
        [data-theme="dark"] .btn-primary { color: #0f0d1a; }
        
        .btn-primary:hover { background: var(--accent-green); transform: translateY(-2px); }
        .btn-secondary { background: var(--toolbar-bg); color: var(--accent-purple); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--toolbar-active); }
        .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-outline:hover { color: var(--text); border-color: var(--text-muted); }

        #status-msg {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-green);
            opacity: 0;
            transition: var(--transition);
        }
        #status-msg.show { opacity: 1; }

        .editor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            margin-top: -1px;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .settings-section { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .button-row button { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="back-link">← BACK</a>
            <span class="thin-title">Smart URL Editor</span>
        </div>
        <button id="themeToggle" class="theme-toggle" title="Toggle Theme">🌙</button>
    </nav>

    <div class="main-container">
        <main class="editor-section">
            <div id="editor"></div>
            <div class="editor-footer">
                <div id="status-msg"></div>
                <div class="stats">
                    <span id="charCount">0 Characters</span>
                    <span id="wordCount">0 Words</span>
                </div>
            </div>
        </main>

        <section class="settings-section">
            <div class="card">
                <div class="input-group">
                    <label for="listTitle">Document Title</label>
                    <input type="text" id="listTitle" placeholder="Give your document a name..." value="(Your Document Title)">
                </div>

                <div class="button-row">
                    <button class="btn btn-primary" onclick="copyFullUrl()">
                        <span>🔗</span>&nbsp; Copy Sharable URL
                    </button>
                    <button class="btn btn-secondary" onclick="exportBase64()">
                        <span>📄</span>&nbsp; Export to Base64
                    </button>
                    <button class="btn btn-outline" onclick="clearAll()">
                        <span>🗑️</span>&nbsp; Clear All
                    </button>
                </div>
            </div>

            <div class="card">
                <label for="importBase64">Import Content</label>
                <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
                    <input type="text" id="importBase64" placeholder="Paste Base64 string here...">
                    <button class="btn btn-primary" onclick="importFromBase64()">Import</button>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        const titleInput = document.getElementById('listTitle');
        const importInput = document.getElementById('importBase64');
        const statusEl = document.getElementById('status-msg');
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // Theme Logic
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('editor-theme', newTheme);
        });

        // Restore Theme
        const savedTheme = localStorage.getItem('editor-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

        // Quill Initialization
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Start typing your notes...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'blockquote', 'code-block'],
                    ['clean']
                ]
            }
        });

        function showStatus(msg, color = 'var(--accent-green)') {
            statusEl.textContent = msg;
            statusEl.style.color = color;
            statusEl.classList.add('show');
            setTimeout(() => statusEl.classList.remove('show'), 3000);
        }

        function utoa(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
        }

        function atou(str) {
            try {
                return decodeURIComponent(Array.prototype.map.call(atob(str), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            } catch(e) { return atob(str); }
        }

        function getData() {
            return { t: titleInput.value, d: [{ t: quill.getSemanticHTML() }] };
        }

        function updateUrl() {
            try {
                const base64 = utoa(JSON.stringify(getData()));
                window.history.replaceState(null, null, '#' + base64);
            } catch (e) { console.error(e); }
        }

        function loadFromUrl() {
            const hash = window.location.hash.substring(1);
            if (!hash) return;
            try {
                const data = JSON.parse(atou(hash));
                if (data.t !== undefined) titleInput.value = data.t;
                if (data.d && data.d[0]) {
                    quill.setContents([]);
                    quill.clipboard.dangerouslyPasteHTML(data.d[0].t);
                }
            } catch (e) { console.error(e); }
        }

        function copyFullUrl() {
            updateUrl();
            navigator.clipboard.writeText(window.location.href).then(() => showStatus('🚀 URL copied!'));
        }

        function exportBase64() {
            navigator.clipboard.writeText(utoa(JSON.stringify(getData()))).then(() => showStatus('📄 Base64 exported!'));
        }

        function clearAll() {
            if (confirm('Clear everything?')) {
                titleInput.value = '(Untitled Document)';
                quill.setContents([]);
                updateUrl();
            }
        }

        function importFromBase64() {
            const b64 = importInput.value.trim();
            if (!b64) return;
            try {
                const data = JSON.parse(atou(b64));
                if (data.t !== undefined) titleInput.value = data.t;
                if (data.d && data.d[0]) {
                    quill.setContents([]);
                    quill.clipboard.dangerouslyPasteHTML(data.d[0].t);
                }
                updateUrl();
                importInput.value = '';
                showStatus('✅ Imported!');
            } catch (e) { showStatus('❌ Error!', 'var(--accent-purple)'); }
        }

        const charCountEl = document.getElementById('charCount');
        const wordCountEl = document.getElementById('wordCount');

        function updateStats() {
            const text = quill.getText().trim();
            const charCount = text.length;
            const wordCount = text.length > 0 ? text.split(/\s+/).length : 0;
            charCountEl.textContent = `${charCount} Characters`;
            wordCountEl.textContent = `${wordCount} Words`;
        }

        let db;
        const deb = () => { 
            clearTimeout(db); 
            db = setTimeout(() => {
                updateUrl();
                updateStats();
            }, 500); 
        };
        titleInput.addEventListener('input', deb);
        quill.on('text-change', deb);

        window.addEventListener('load', () => {
            loadFromUrl();
            updateStats();
        });
        window.addEventListener('hashchange', () => {
            if (utoa(JSON.stringify(getData())) !== window.location.hash.substring(1)) loadFromUrl();
            });
    </script>
</body>
</html>
